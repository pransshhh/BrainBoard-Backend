# This project, `brainboard-backend`, is a Node.js API service built with Express.js and TypeScript.
# It serves as the backend for the "Brainboard" application, providing necessary API endpoints.
#
# Sprint work completed this cycle:
#

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Node.js is the runtime for this project

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # Compiles TypeScript to JavaScript

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Source nvm so node/npm/pnpm are available in the non-interactive SSH shell
            export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # cd to the deploy directory
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            # Pull latest changes from main branch
            git pull origin main

            # Sync new env vars from .env.sample into .env (append missing keys only, never overwrite)
            if [ -f .env.sample ]; then
              touch .env
              while IFS= read -r line; do
                # skip blank lines and comments
                [[ -z "$line" || "$line" == \#* ]] && continue
                key=$(echo "$line" | cut -d= -f1)
                # only append if key not already present in .env
                if ! grep -q "^${key}=" .env 2>/dev/null; then
                  echo "$line" >> .env
                  echo "⚠️  New env var added (set real value): ${key}"
                fi
              done < .env.sample
            fi

            # Install dependencies
            npm ci

            # Run build step
            npm run build

            # Restart the app with PM2 using zero-downtime reload or start if not running
            pm2 reload app --update-env || pm2 start dist/index.js --name app

            # Save PM2 process list
            pm2 save