name: CI

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build check
      run: npm run build

    - name: Run lint
      run: npm run lint

    - name: Send failure notification
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: '#ci-failures' # Replace with your desired Slack channel
        SLACK_MESSAGE: 'CI pipeline failed for ${{ github.repository }} on branch ${{ github.ref_name }}! (<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>)'
        SLACK_TITLE: 'CI Failure Alert'
        SLACK_COLOR: 'danger'
